<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiftTrack — Accept Invite</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; color: #333; }
        .card { text-align: center; background: #fff; padding: 2rem; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.1); max-width: 360px; }
        h1 { font-size: 1.4rem; margin-bottom: .5rem; }
        p { font-size: .95rem; color: #666; }
        .spinner { width: 32px; height: 32px; border: 3px solid #ddd; border-top-color: #4285f4; border-radius: 50%; animation: spin .8s linear infinite; margin: 1rem auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        a.btn { display: inline-block; margin-top: 1rem; padding: .75rem 1.5rem; background: #4285f4; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 500; }
    </style>
</head>
<body>
<div class="card">
    <h1>ShiftTrack Invite</h1>
    <div class="spinner" id="spinner"></div>
    <p id="msg">Opening the app…</p>
    <a class="btn" id="fallback" style="display:none" href="#">Open in ShiftTrack</a>
</div>
<script>
(function () {
    var params = new URLSearchParams(window.location.search);
    var token  = params.get("token") || "";

    // Validate UUID format
    if (!/^[0-9a-fA-F\-]{36}$/.test(token)) {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("msg").textContent = "Invalid or missing invite token.";
        return;
    }

    var customUri = "shiftapp://invite/" + encodeURIComponent(token);

    // Chrome on Android supports intent:// URIs to launch apps
    var intentUri = "intent://invite/" + encodeURIComponent(token)
        + "#Intent;scheme=shiftapp;package=com.slikharev.shifttrack;end";

    // Detect Chrome on Android
    var isChrome = /Chrome/.test(navigator.userAgent) && /Android/.test(navigator.userAgent);

    // Try to open the app
    var launchUri = isChrome ? intentUri : customUri;
    window.location.href = launchUri;

    // After a delay, show a manual fallback button
    setTimeout(function () {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("msg").textContent =
            "If the app didn\u2019t open, tap the button below.";
        var btn = document.getElementById("fallback");
        btn.href = intentUri;
        btn.style.display = "inline-block";
    }, 2000);
})();
</script>
</body>
</html>
